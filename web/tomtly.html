<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placely – Tomtly Tomteanalyse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0d0d0d; --white: #fff;
      --g50: #f7f7f5; --g100: #efefed; --g200: #e0ddd8; --g500: #76736c;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', sans-serif; font-size: 14px; color: var(--black);
           background: var(--white); display: flex; flex-direction: column;
           -webkit-font-smoothing: antialiased; }

    /* ── HEADER ── */
    header {
      height: 46px;
      background: rgba(255,255,255,.95);
      border-bottom: 1px solid var(--g100);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      flex-shrink: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    .logo { font-size: 15px; font-weight: 800; letter-spacing: -.04em; text-decoration: none; color: var(--black); }
    .logo em { font-style: normal; color: var(--g500); font-weight: 500; }
    .h-sep { width: 1px; height: 18px; background: var(--g200); }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--g50); border: 1px solid var(--g100);
      border-radius: 99px; padding: 3px 10px 3px 8px;
      font-size: 12px; font-weight: 600; color: var(--g500);
    }
    .badge-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5);opacity:.6} }
    .hsp { flex: 1; }
    .btn-back {
      padding: 5px 12px; font-size: 12px; font-weight: 600;
      border-radius: 5px; background: var(--white); color: var(--black);
      border: 1px solid var(--g200); cursor: pointer; font-family: inherit;
      text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
      transition: border-color .15s;
    }
    .btn-back:hover { border-color: var(--black); }
    .btn-ext {
      padding: 5px 12px; font-size: 12px; font-weight: 600;
      border-radius: 5px; background: var(--black); color: var(--white);
      border: none; cursor: pointer; font-family: inherit;
      text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
      transition: background .15s;
    }
    .btn-ext:hover { background: #1a1a1a; }

    /* ── IFRAME ── */
    #frame-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #tomtly-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      background: var(--g50);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 5;
      transition: opacity .3s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--g200);
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 14px; font-weight: 600; color: var(--g500); }
    #loading small { font-size: 12px; color: var(--g500); }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">Placely</a>
  <div class="h-sep"></div>
  <div class="badge">
    <div class="badge-dot"></div>
    Tomtly – Tomteanalyse
  </div>
  <div class="hsp"></div>
  <a href="index.html" class="btn-back">← Tilbake</a>
  <a href="https://tomtly-ochre.vercel.app/tomteanalyse" target="_blank" rel="noopener" class="btn-ext">
    Åpne i ny fane ↗
  </a>
</header>

<div id="frame-wrap">
  <div id="loading">
    <div class="spinner"></div>
    <p>Laster Tomtly Tomteanalyse…</p>
    <small>Analyserer reguleringsplaner, bestemmelser og Norkart-data</small>
  </div>
  <iframe
    id="tomtly-frame"
    src="https://tomtly-ochre.vercel.app/tomteanalyse"
    title="Tomtly Tomteanalyse"
    allow="geolocation; clipboard-read; clipboard-write"
    onload="document.getElementById('loading').classList.add('hidden')"
  ></iframe>
</div>

</body>
</html>
